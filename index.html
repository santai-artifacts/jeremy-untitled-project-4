<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #160812;
    --panel: #24101b;
    --panel-2: #2e1422;
    --grid: #2a1320;
    --accent: #ec4899;
    --accent-2: #db2777;
    --food: #fbbf24;
    --text: #fce7f0;
    --muted: #c08aa3;
    --shadow: 0 20px 60px -15px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #3a142a 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .title .dot {
    width: 14px; height: 14px;
    border-radius: 4px;
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent);
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .scores {
    display: flex;
    gap: 10px;
  }
  .score-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 8px 14px;
    text-align: right;
    min-width: 76px;
  }
  .score-card .label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .score-card .val {
    font-size: 1.3rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 14px;
    box-shadow: var(--shadow);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 10px;
    background: var(--panel-2);
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 10px;
    background: rgba(22,8,18,0.82);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
    transition: opacity 0.25s ease;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .overlay h2 {
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .overlay p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
    max-width: 280px;
  }

  .btn {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: #2a0814;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    box-shadow: 0 8px 20px -6px var(--accent-2);
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }

  kbd {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.12);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 0.8rem;
    font-family: inherit;
    color: var(--text);
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 0.82rem;
  }
  .footer .hint { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .speed {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .speed button {
    font-family: inherit;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .speed button.active {
    color: #2a0814;
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* On-screen dpad for touch */
  .dpad {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    max-width: 220px;
    margin: 4px auto 0;
  }
  .dpad button {
    font-size: 1.3rem;
    color: var(--text);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 0;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s ease;
  }
  .dpad button:active { background: var(--panel-2); }
  .dpad .up    { grid-column: 2; grid-row: 1; }
  .dpad .left  { grid-column: 1; grid-row: 2; }
  .dpad .down  { grid-column: 2; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }

  @media (hover: none) and (pointer: coarse) {
    .dpad { display: grid; }
  }

  @media (prefers-reduced-motion: reduce) {
    .btn { transition: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <span class="dot"></span>
        <h1>Worm</h1>
      </div>
      <div class="scores">
        <div class="score-card">
          <div class="label">Score</div>
          <div class="val" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="label">Best</div>
          <div class="val" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="board" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ov-title">Ready?</h2>
        <p id="ov-text">Eat the food, grow as long as you can, and don't bite yourself or hit a wall.</p>
        <button class="btn" id="start-btn">Play</button>
        <p style="font-size:0.8rem">Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> · <kbd>Space</kbd> to pause</p>
      </div>
    </div>

    <div class="footer">
      <div class="hint"><kbd>Space</kbd> pause / resume</div>
      <div class="speed">
        <span style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;">Speed</span>
        <button data-speed="slow">Slow</button>
        <button data-speed="normal" class="active">Normal</button>
        <button data-speed="fast">Fast</button>
      </div>
    </div>

    <div class="dpad">
      <button class="up" data-dir="up" aria-label="Up">▲</button>
      <button class="left" data-dir="left" aria-label="Left">◀</button>
      <button class="down" data-dir="down" aria-label="Down">▼</button>
      <button class="right" data-dir="right" aria-label="Right">▶</button>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const GRID = 20;            // cells per side
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const cell = canvas.width / GRID;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovText = document.getElementById('ov-text');
  const startBtn = document.getElementById('start-btn');

  const SPEEDS = { slow: 140, normal: 100, fast: 65 };

  // Game state (in-memory only — no persistence in the sandbox)
  let worm, dir, nextDir, food, score, best = 0;
  let tickMs = SPEEDS.normal;
  let state = 'idle';        // idle | running | paused | over
  let acc = 0, lastTime = 0, rafId = null;
  let foodPulse = 0;

  function reset() {
    const mid = Math.floor(GRID / 2);
    worm = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = '0';
    placeFood();
  }

  function placeFood() {
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (worm.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  function setDirection(nx, ny) {
    // prevent 180° reversals against current heading
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  function step() {
    dir = nextDir;
    const head = { x: worm[0].x + dir.x, y: worm[0].y + dir.y };

    // wall or self collision = game over
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        worm.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    worm.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
      foodPulse = 1;
      placeFood();
    } else {
      worm.pop();
    }
  }

  function gameOver() {
    state = 'over';
    cancelAnimationFrame(rafId);
    rafId = null;
    ovTitle.textContent = 'Game Over';
    ovText.textContent = `You scored ${score} point${score === 1 ? '' : 's'}.` +
      (score === best && score > 0 ? ' New best! 🎉' : '');
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  // ---- Rendering ----
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
  }

  function draw() {
    // background
    ctx.fillStyle = '#2e1422';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, canvas.height); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cell); ctx.lineTo(canvas.width, i * cell); ctx.stroke();
    }

    // food (pulsing)
    foodPulse = Math.max(0, foodPulse - 0.05);
    const grow = foodPulse * 3;
    ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 12;
    roundRect(food.x * cell + 3 - grow / 2, food.y * cell + 3 - grow / 2,
              cell - 6 + grow, cell - 6 + grow, 6);
    ctx.shadowBlur = 0;

    // worm
    for (let i = worm.length - 1; i >= 0; i--) {
      const s = worm[i];
      const t = i / Math.max(1, worm.length - 1); // 0 head -> 1 tail
      if (i === 0) {
        ctx.fillStyle = '#ec4899';
        ctx.shadowColor = '#ec4899';
        ctx.shadowBlur = 10;
      } else {
        // gradient body from bright pink to deep magenta toward the tail
        const r = Math.round(236 - t * 46);
        const g = Math.round(72 - t * 48);
        const b = Math.round(153 - t * 60);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.shadowBlur = 0;
      }
      const pad = i === 0 ? 1.5 : 2.5;
      roundRect(s.x * cell + pad, s.y * cell + pad, cell - pad * 2, cell - pad * 2, 5);
    }
    ctx.shadowBlur = 0;

    // eyes on the head
    drawEyes();
  }

  function drawEyes() {
    const h = worm[0];
    const cx = h.x * cell + cell / 2;
    const cy = h.y * cell + cell / 2;
    const off = cell * 0.18;
    const r = cell * 0.09;
    // perpendicular offset for two eyes based on heading
    const px = dir.y, py = dir.x;
    ctx.fillStyle = '#3d0a24';
    for (const sgn of [-1, 1]) {
      const ex = cx + dir.x * off + px * off * sgn;
      const ey = cy + dir.y * off + py * off * sgn;
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ---- Loop ----
  function loop(time) {
    if (state !== 'running') return;
    if (!lastTime) lastTime = time;
    const delta = time - lastTime;
    lastTime = time;
    acc += delta;
    while (acc >= tickMs) {
      step();
      acc -= tickMs;
      if (state !== 'running') break; // gameOver may flip state mid-tick
    }
    draw();
    if (state === 'running') rafId = requestAnimationFrame(loop);
  }

  function startGame() {
    reset();
    state = 'running';
    overlay.classList.add('hidden');
    acc = 0; lastTime = 0;
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (state === 'running') {
      state = 'paused';
      cancelAnimationFrame(rafId);
      rafId = null;
      ovTitle.textContent = 'Paused';
      ovText.textContent = 'Take a breath. Your worm will wait.';
      startBtn.textContent = 'Resume';
      overlay.classList.remove('hidden');
    } else if (state === 'paused') {
      state = 'running';
      overlay.classList.add('hidden');
      lastTime = 0;
      rafId = requestAnimationFrame(loop);
    }
  }

  // ---- Input ----
  const KEYMAP = {
    ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
    ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
    ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
    ArrowRight: [1, 0], d: [1, 0], D: [1, 0],
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (state === 'running' || state === 'paused') togglePause();
      else startGame();
      return;
    }
    if (e.key === 'Enter' && (state === 'idle' || state === 'over')) {
      startGame();
      return;
    }
    const m = KEYMAP[e.key];
    if (m) {
      e.preventDefault();
      if (state === 'running') setDirection(m[0], m[1]);
    }
  });

  startBtn.addEventListener('click', () => {
    if (state === 'paused') togglePause();
    else startGame();
  });

  // speed selector
  document.querySelectorAll('.speed button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.speed button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      tickMs = SPEEDS[b.dataset.speed];
    });
  });

  // touch dpad
  const DIRS = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
  document.querySelectorAll('.dpad button').forEach(b => {
    b.addEventListener('click', () => {
      if (state === 'running') { const d = DIRS[b.dataset.dir]; setDirection(d[0], d[1]); }
      else if (state !== 'over') startGame();
    });
  });

  // swipe on canvas for mobile
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart || state !== 'running') return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  // Initial paint
  reset();
  draw();
})();
</script>
</body>
</html>
